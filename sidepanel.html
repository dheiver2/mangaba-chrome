<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mangaba AI</title>
<link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<header>
  <div class="logo"><img src="icons/mark.png" alt="mangaba.ai"> <span>mangaba<b>.ai</b></span></div>
  <button id="btnSettings" title="Configurações">⚙</button>
</header>

<div id="settings" class="hidden">
  <label>URL do Gateway
    <input id="cfgUrl" placeholder="http://localhost:8080/v1/chat/completions">
  </label>
  <label>Modelo
    <input id="cfgModel" placeholder="ex.: qwen3-4b">
  </label>
  <label>API Key (opcional)
    <input id="cfgKey" type="password">
  </label>
  <label>Máx. passos do agente (3–50)
    <input id="cfgSteps" type="number" min="3" max="50" value="20">
  </label>
  <label>Meus dados (chave: valor — use como {{chave}}; nunca vão ao modelo)
    <textarea id="cfgDados" rows="3" placeholder="nome: João Silva&#10;email: joao@exemplo.com&#10;telefone: 82 99999-0000"></textarea>
  </label>
  <label>Servidores MCP (nome | https://url | Authorization opcional — um por linha; # comenta)
    <textarea id="cfgMcps" rows="4" placeholder="deepwiki | https://mcp.deepwiki.com/mcp&#10;context7 | https://mcp.context7.com/mcp&#10;# huggingface | https://huggingface.co/mcp | Bearer hf_SEU_TOKEN"></textarea>
  </label>
  <label>Modo do agente (deixe em Automático — ele escolhe o especialista sozinho)
    <select id="agentSel">
      <option value="auto">Automático (escolhe o agente sozinho)</option>
      <option value="navegador">Navegador</option>
      <option value="pesquisador">Pesquisador</option>
      <option value="leitor">Leitor</option>
      <option value="preenchedor">Preenchedor</option>
      <option value="social">Social</option>
      <option value="acesso">Acesso</option>
      <option value="extrator">Extrator (listas/tabelas)</option>
      <option value="painel">Painel (relatórios/dashboards)</option>
      <option value="monitor">Monitor (mudanças)</option>
      <option value="comparador">Comparador (multi-fontes)</option>
      <option value="agendador">Agendador (reservas/horários)</option>
      <option value="candidato">Candidato (vagas)</option>
      <option value="coletor">Coletor (arquivos/faturas)</option>
      <option value="rastreador">Rastreador (pedidos)</option>
    </select>
  </label>
  <button id="btnSave">Salvar</button>
</div>

<main id="chat">
  <div class="arow"><img class="avatar" src="icons/mark.png" alt="">
    <div class="msg assistant"><p>Olá! Sou a <b>Mangaba</b>. Pergunte sobre esta página ou peça uma tarefa (ex.: <i>"resuma isto"</i>, <i>"comente no primeiro vídeo"</i>) — eu entendo sozinha o que fazer.</p></div>
  </div>
</main>

<footer>
  <div class="inputrow">
    <textarea id="input" rows="2" placeholder="Pergunte ou peça uma tarefa..."></textarea>
    <button id="btnSend">↑</button>
  </div>
  <div class="hint">A Mangaba entende sozinha se é pergunta ou tarefa.</div>
</footer>

<script src="mcp.js"></script>
<script src="sidepanel.js"></script>
</body>
</html>
