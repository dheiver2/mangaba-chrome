<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mangaba AI</title>
<link rel="stylesheet" href="sidepanel.css">
</head>
<body>
<header>
  <div class="logo"><img src="icons/mark.png" alt="mangaba.ai"> <span>mangaba<b>.ai</b></span></div>
  <button id="btnSettings" title="Configurações">⚙︎</button>
</header>

<div id="settings" class="hidden">
  <label>URL do Gateway
    <input id="cfgUrl" placeholder="http://localhost:8080/v1/chat/completions">
  </label>
  <label>Modelo
    <input id="cfgModel" placeholder="ex.: qwen3-4b">
  </label>
  <label>API Key (opcional)
    <input id="cfgKey" type="password">
  </label>
  <label>Máx. passos do agente (3–50)
    <input id="cfgSteps" type="number" min="3" max="50" value="20">
  </label>
  <button id="btnSave">Salvar</button>
</div>

<main id="chat">
  <div class="arow"><img class="avatar" src="icons/mark.png" alt="">
    <div class="msg assistant"><p>Olá! Sou a <b>Mangaba</b>. Posso ler a página atual, responder perguntas sobre ela e, no <b>modo agente</b>, executar tarefas no navegador por você.</p></div>
  </div>
</main>

<footer>
  <div class="ctxrow">
    <label class="ctx"><input type="checkbox" id="usePage" checked> Contexto da página</label>
    <label class="ctx"><input type="checkbox" id="agentMode"> 🤖 Modo agente</label>
    <select id="agentSel" title="Qual agente executa a tarefa">
      <option value="auto">🧠 Auto</option>
      <option value="navegador">🧭 Navegador</option>
      <option value="pesquisador">🔎 Pesquisador</option>
      <option value="leitor">📖 Leitor</option>
      <option value="preenchedor">📝 Preenchedor</option>
      <option value="social">💬 Social</option>
      <option value="acesso">🔐 Acesso</option>
    </select>
  </div>
  <div class="inputrow">
    <textarea id="input" rows="2" placeholder="Pergunte algo..."></textarea>
    <button id="btnSend">➤</button>
  </div>
</footer>

<script src="sidepanel.js"></script>
</body>
</html>
